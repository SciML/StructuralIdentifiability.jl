name: "Downgrade"

on:
  pull_request:
    branches:
      - master
    paths-ignore:
      - 'docs/**'
  push:
    branches:
      - master
    paths-ignore:
      - 'docs/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/master' }}

jobs:
  downgrade:
    name: "Downgrade"
    strategy:
      fail-fast: false
      matrix:
        group:
          - "Core"
    uses: "SciML/.github/.github/workflows/downgrade.yml@v1"
    with:
      group: "${{ matrix.group }}"
      julia-version: "lts"
    secrets: "inherit"
